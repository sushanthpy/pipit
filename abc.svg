  <text class="h" x="1105" y="150">Execute</text>
  <text class="t" x="1108" y="175">tool call</text>

  <path class="a" d="M170 160 H220"/>
  <path class="a" d="M390 160 H440"/>
  <path class="a" d="M600 160 H650"/>
  <path class="a" d="M830 160 H880"/>
  <path class="a" d="M1060 160 H1090"/>

  <rect class="b" x="900" y="260" width="180" height="70"/>
  <text class="h" x="944" y="290">Audit Log</text>
  <text class="t" x="923" y="312">decision + evidence</text>
  <path class="a" d="M970 215 V260"/>
  <path class="a" d="M1135 200 V260 H1080"/>
