<svg viewBox="0 0 1200 360" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .b{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:14;ry:14}
    .t{font:16px sans-serif;fill:#0f172a}
    .h{font:18px sans-serif;font-weight:700;fill:#0f172a}
    .a{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#m)}
    .d{fill:#fff7ed;stroke:#c2410c;stroke-width:2}
    .ok{fill:#ecfeff;stroke:#0f766e;stroke-width:2}
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="b" x="20" y="120" width="150" height="80"/>
  <text class="h" x="55" y="150">User Input</text>
  <text class="t" x="38" y="175">question / request</text>

  <rect class="b" x="220" y="120" width="170" height="80"/>
  <text class="h" x="258" y="150">Normalize</text>
  <text class="t" x="235" y="175">intent, entities, scope</text>

  <rect class="b" x="440" y="120" width="160" height="80"/>
